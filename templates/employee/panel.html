<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Учёт рабочего времени</title>
    <style>
        /* CSS-переменные для светлой и тёмной темы */
        :root {
            --bg-page: #f5f7fa;
            --bg-panel: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --button-work: #22c55e;
            --button-work-hover: #16a34a;
            --button-pause: #eab308;
            --button-pause-hover: #ca8a04;
            --button-stop: #ef4444;
            --button-stop-hover: #dc2626;
            --button-resume: #3b82f6;
            --button-resume-hover: #2563eb;
            --border-color: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --footer-text: #64748b;
        }

        body.dark-mode {
            --bg-page: #0f172a;
            --bg-panel: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-color: #60a5fa;
            --accent-hover: #3b82f6;
            --button-work: #16a34a;
            --button-work-hover: #15803d;
            --button-pause: #ca8a04;
            --button-pause-hover: #a16207;
            --button-stop: #dc2626;
            --button-stop-hover: #b91c1c;
            --button-resume: #60a5fa;
            --button-resume-hover: #3b82f6;
            --border-color: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --footer-text: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background-color 0.3s, color 0.3s;
        }

        .panel {
            background-color: var(--bg-panel);
            border-radius: 32px;
            box-shadow: var(--shadow);
            padding: 32px 24px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            transition: background-color 0.3s, box-shadow 0.3s;
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
            word-break: break-word;
        }

        .theme-toggle {
            background: var(--bg-page);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            transition: background-color 0.2s;
            user-select: none;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
        }

        .status-card {
            background: var(--bg-page);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .status-label {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .status-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 24px;
        }

        .action-btn {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 20px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            letter-spacing: 0.5px;
            touch-action: manipulation;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn.work {
            background-color: var(--button-work);
        }
        .action-btn.work:hover {
            background-color: var(--button-work-hover);
        }
        .action-btn.pause {
            background-color: var(--button-pause);
        }
        .action-btn.pause:hover {
            background-color: var(--button-pause-hover);
        }
        .action-btn.stop {
            background-color: var(--button-stop);
        }
        .action-btn.stop:hover {
            background-color: var(--button-stop-hover);
        }
        .action-btn.resume {
            background-color: var(--button-resume);
        }
        .action-btn.resume:hover {
            background-color: var(--button-resume-hover);
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--footer-text);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            font-style: italic;
            transition: color 0.3s;
        }

        /* Адаптивность */
        @media (max-width: 380px) {
            .panel {
                padding: 24px 16px;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .action-btn {
                font-size: 1.2rem;
                padding: 16px 20px;
            }
            .status-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <h1>Здравствуйте,<br>{{ employee.last_name }} {{ employee.first_name }}!</h1>
            <div class="theme-toggle" id="theme-toggle">
                <span>🌙</span> Тёмная
            </div>
        </div>

        <div class="status-card">
            <div class="status-label">Текущий статус</div>
            <div class="status-value" id="status-text">
                {% if status == 'work' %}
                    работаем
                {% elif status == 'pause' %}
                    пауза
                {% else %}
                    не начато
                {% endif %}
            </div>
        </div>

        <div class="button-group" id="buttons">
            <!-- Кнопки будут динамически заменяться -->
        </div>

        <div class="footer">
            Сила тока - это када есть ТОКА сила, ума нинада.
        </div>
    </div>

    <script>
        const token = "{{ employee.token }}";
        let currentStatus = "{{ status }}";

        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Функция установки темы
        function setTheme(theme) {
            if (theme === 'dark') {
                body.classList.add('dark-mode');
                themeToggle.innerHTML = '<span>☀️</span> Светлая';
            } else {
                body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<span>🌙</span> Тёмная';
            }
            localStorage.setItem('employeeTheme', theme);
        }

        // Инициализация темы из localStorage
        const savedTheme = localStorage.getItem('employeeTheme') || 'light';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const newTheme = body.classList.contains('dark-mode') ? 'light' : 'dark';
            setTheme(newTheme);
        });

        // Обновление кнопок и статуса
        function updateButtons() {
            const container = document.getElementById('buttons');
            const statusDiv = document.getElementById('status-text');
            let html = '';
            if (currentStatus === 'none') {
                html += '<button class="action-btn work" onclick="sendAction(\'start\')">Работа начата</button>';
                statusDiv.innerText = 'не начато';
            } else if (currentStatus === 'work') {
                html += '<button class="action-btn pause" onclick="sendAction(\'pause\')">Пауза</button>';
                html += '<button class="action-btn stop" onclick="sendAction(\'stop\')">Закончил работу</button>';
                statusDiv.innerText = 'работаем';
            } else if (currentStatus === 'pause') {
                html += '<button class="action-btn resume" onclick="sendAction(\'resume\')">Возобновить работу</button>';
                html += '<button class="action-btn stop" onclick="sendAction(\'stop\')">Закончил работу</button>';
                statusDiv.innerText = 'пауза';
            }
            container.innerHTML = html;
        }

        async function sendAction(action) {
            // Блокируем повторные нажатия (простая защита)
            const buttons = document.querySelectorAll('.action-btn');
            buttons.forEach(btn => btn.disabled = true);

            try {
                const response = await fetch(`/api/employee/${token}/${action}`, { method: 'POST' });
                const data = await response.json();
                if (response.ok) {
                    currentStatus = data.status;
                    updateButtons();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (error) {
                alert('Ошибка сети: ' + error.message);
            } finally {
                buttons.forEach(btn => btn.disabled = false);
            }
        }

        // Инициализация кнопок
        updateButtons();
    </script>
</body>
</html>
